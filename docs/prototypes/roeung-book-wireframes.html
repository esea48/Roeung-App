<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roeung — Book Reading Wireframes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f7f7;
  --bg3: #f0f0f0;
  --text1: #1a1a1a;
  --text2: #555555;
  --text3: #999999;
  --border1: #cccccc;
  --border2: #e0e0e0;
  --border3: #eeeeee;
  --info: #0066cc;
  --info-bg: #eef4ff;
  --success: #2d7d2d;
  --danger: #cc2200;
  --warn-bg: #faeeda;
  --warn: #ba7517;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: #e8e8e8; padding: 24px; color: var(--text1); }
h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: var(--text3); margin-bottom: 20px; }

/* ── Controls ─────────────────────────── */
.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.device-toggle { display: flex; border: 1px solid var(--border1); border-radius: 20px; overflow: hidden; background: var(--bg); }
.dt-btn { font-size: 11px; padding: 5px 14px; cursor: pointer; color: var(--text2); background: transparent; border: none; display: flex; align-items: center; gap: 4px; }
.dt-btn.active { background: var(--text1); color: var(--bg); }
.nav-btn { font-size: 11px; padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; cursor: pointer; background: var(--bg); color: var(--text2); }
.nav-btn:hover { background: var(--bg2); }
.nav-btn.cur { background: var(--text1); color: var(--bg); border-color: var(--text1); }
.sep { font-size: 11px; color: var(--text3); margin: 0 4px; }

/* ── Desktop: browser chrome ──────────── */
.browser { border: 1.5px solid var(--border1); border-radius: 12px; overflow: hidden; background: var(--bg); box-shadow: 0 4px 20px rgba(0,0,0,0.12); max-width: 860px; }
.browser-bar { background: var(--bg2); padding: 8px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border3); }
.browser-dots { display: flex; gap: 5px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border2); }
.url-bar { flex: 1; background: var(--bg); border: 0.5px solid var(--border3); border-radius: 6px; padding: 3px 10px; font-size: 10px; color: var(--text3); }

/* Desktop app nav bar */
.app-nav { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-bottom: 0.5px solid var(--border3); }
.app-logo-name { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text1); }
.app-logo-name span { font-size: 16px; }
.breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text3); }
.breadcrumb a { color: var(--info); cursor: pointer; }
.breadcrumb i { font-size: 10px; }
.app-nav-right { margin-left: auto; }
.lang-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 20px; overflow: hidden; }
.lt-btn { font-size: 10px; padding: 3px 10px; cursor: pointer; color: var(--text2); background: transparent; border: none; }
.lt-btn.active { background: var(--text1); color: var(--bg); }

/* Desktop content wrapper */
.d-content { display: flex; flex-direction: column; min-height: 520px; }

/* ── 4.1 Book Home (desktop) ──────────── */
.cover-hero { background: var(--bg2); padding: 28px 20px 22px; text-align: center; border-bottom: 0.5px solid var(--border3); }
.cover-motif { font-size: 30px; margin-bottom: 8px; }
.cover-family-name { font-size: 22px; font-weight: 600; color: var(--text1); margin-bottom: 3px; letter-spacing: -0.01em; }
.cover-family-kh { font-size: 12px; color: var(--text3); }
.section-label { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
.recent-section { padding: 14px 20px; border-bottom: 0.5px solid var(--border3); }
.recent-row { display: flex; gap: 10px; overflow: hidden; }
.recent-card { flex-shrink: 0; width: 165px; border: 0.5px solid var(--border3); border-radius: 8px; padding: 10px 12px; cursor: pointer; }
.recent-card:hover { border-color: var(--border2); background: var(--bg2); }
.rc-title { font-size: 11px; font-weight: 500; color: var(--text1); margin-bottom: 3px; line-height: 1.4; }
.rc-meta { font-size: 9px; color: var(--text3); }
.chapters-section { padding: 14px 20px; }
.chapter-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 0.5px solid var(--border3); border-radius: 8px; margin-bottom: 7px; cursor: pointer; }
.chapter-row:hover { border-color: var(--border2); background: var(--bg2); }
.chapter-icon { width: 30px; height: 30px; border-radius: 6px; background: var(--bg2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chapter-icon i { font-size: 15px; color: var(--text2); }
.chapter-name { font-size: 12px; font-weight: 500; color: var(--text1); margin-bottom: 1px; }
.chapter-meta { font-size: 10px; color: var(--text3); }
.chapter-chevron { margin-left: auto; font-size: 14px; color: var(--text3); }

/* ── 4.2 Chapter View (desktop) ─────── */
.chapter-page-header { padding: 14px 20px; border-bottom: 0.5px solid var(--border3); }
.chapter-page-title { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.chapter-page-sub { font-size: 11px; color: var(--text3); }
.toolbar { display: flex; align-items: center; justify-content: space-between; padding: 9px 20px; border-bottom: 0.5px solid var(--border3); }
.sort-sel { font-size: 11px; border: 0.5px solid var(--border2); border-radius: 6px; padding: 3px 8px; background: var(--bg); color: var(--text1); }
.filter-row { display: flex; gap: 6px; }
.f-chip { font-size: 10px; padding: 3px 9px; border: 0.5px solid var(--border2); border-radius: 20px; color: var(--text2); cursor: pointer; }
.stories-list { padding: 12px 20px; }
.story-card { border: 0.5px solid var(--border3); border-radius: 8px; padding: 11px 14px; margin-bottom: 7px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
.story-card:hover { border-color: var(--border2); background: var(--bg2); }
.sc-main { flex: 1; min-width: 0; }
.sc-title { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
.sc-meta { font-size: 10px; color: var(--text3); }
.sc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
.badge-warn { background: var(--warn-bg); color: var(--warn); }
.badge-lang { background: var(--bg2); color: var(--text2); font-weight: 400; }
.badge-dur { color: var(--text3); font-weight: 400; }

/* ── 4.3 / 4.4 Story Page (desktop) ─── */
.story-page-header { padding: 16px 20px; border-bottom: 0.5px solid var(--border3); }
.story-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.story-byline { font-size: 11px; color: var(--text3); margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
.story-byline strong { color: var(--text2); font-weight: 500; }
.translation-flag { display: flex; align-items: center; gap: 6px; background: var(--warn-bg); border: 0.5px solid var(--warn); border-radius: 6px; padding: 6px 10px; font-size: 11px; color: var(--warn); }
.translation-flag i { font-size: 14px; flex-shrink: 0; }
.story-body { padding: 16px 20px; flex: 1; }
.bilin-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 20px; overflow: hidden; width: fit-content; margin-bottom: 16px; }
.bt-btn { font-size: 10px; padding: 4px 14px; cursor: pointer; color: var(--text2); background: transparent; border: none; }
.bt-btn.active { background: var(--text1); color: var(--bg); }
.story-text { font-size: 13px; line-height: 1.9; color: var(--text1); max-width: 640px; }
.story-para { margin-bottom: 16px; }
.hl { background: #dceeff; border-radius: 2px; padding: 0 2px; }
.tags-section { padding: 10px 20px; border-top: 0.5px solid var(--border3); }
.tags-label { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 7px; }
.tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-chip { font-size: 10px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: 20px; color: var(--info); cursor: pointer; }
.tag-chip:hover { background: var(--info-bg); }

/* Audio player */
.audio-player { border-top: 0.5px solid var(--border3); padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: var(--bg2); }
.play-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; background: var(--bg); }
.play-btn.playing { background: var(--text1); border-color: var(--text1); }
.play-btn i { font-size: 13px; color: var(--text2); }
.play-btn.playing i { color: var(--bg); }
.wav-track { flex: 1; height: 28px; display: flex; align-items: center; gap: 1.5px; }
.wb { border-radius: 1px; background: var(--border3); width: 2.5px; }
.wb.p { background: var(--text1); }
.pt { font-size: 10px; color: var(--text3); flex-shrink: 0; }
.spd-ctrl { display: flex; gap: 4px; }
.spd-btn { font-size: 9px; padding: 2px 7px; border: 0.5px solid var(--border2); border-radius: 4px; color: var(--text2); cursor: pointer; background: var(--bg); }
.spd-btn.active { background: var(--text1); color: var(--bg); border-color: var(--text1); }

/* Story prev/next */
.story-nav { display: flex; align-items: center; justify-content: space-between; padding: 9px 20px; border-top: 0.5px solid var(--border3); }
.snav-btn { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--info); cursor: pointer; }
.snav-btn i { font-size: 14px; }
.snav-cur { font-size: 10px; color: var(--text3); }

/* ── Mobile: phone frame ─────────────── */
.phone { width: 270px; flex-shrink: 0; }
.phone-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; text-align: center; }
.phone-frame { border: 2px solid #333; border-radius: 36px; background: var(--bg); overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.m-notch { width: 72px; height: 18px; background: #333; border-radius: 0 0 10px 10px; margin: 0 auto; }
.m-screen { min-height: 560px; display: flex; flex-direction: column; }

/* Mobile app nav */
.m-app-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 0.5px solid var(--border3); }
.m-app-name { font-size: 11px; font-weight: 600; color: var(--text1); display: flex; align-items: center; gap: 4px; }
.m-lang-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 20px; overflow: hidden; }
.m-lt-btn { font-size: 9px; padding: 2px 8px; cursor: pointer; color: var(--text2); background: transparent; border: none; }
.m-lt-btn.active { background: var(--text1); color: var(--bg); }
.m-back-nav { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-bottom: 0.5px solid var(--border3); }
.m-back { font-size: 11px; color: var(--info); display: flex; align-items: center; gap: 3px; cursor: pointer; }
.m-back i { font-size: 12px; }
.m-page-title { font-size: 11px; font-weight: 600; margin: 0 auto; padding-right: 40px; }

/* Mobile 4.1 */
.m-cover-hero { background: var(--bg2); padding: 18px 14px 14px; text-align: center; border-bottom: 0.5px solid var(--border3); }
.m-cover-motif { font-size: 22px; margin-bottom: 5px; }
.m-cover-name { font-size: 14px; font-weight: 600; color: var(--text1); margin-bottom: 2px; }
.m-cover-kh { font-size: 10px; color: var(--text3); }
.m-section-label { font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 7px; }
.m-recent-section { padding: 8px 12px; border-bottom: 0.5px solid var(--border3); }
.m-recent-row { display: flex; gap: 7px; overflow: hidden; }
.m-recent-card { flex-shrink: 0; width: 118px; border: 0.5px solid var(--border3); border-radius: 6px; padding: 7px 9px; }
.m-rc-title { font-size: 9px; font-weight: 500; color: var(--text1); margin-bottom: 2px; line-height: 1.4; }
.m-rc-meta { font-size: 8px; color: var(--text3); }
.m-chapters-section { padding: 8px 12px; }
.m-chapter-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 0.5px solid var(--border3); border-radius: 6px; margin-bottom: 5px; cursor: pointer; }
.m-chapter-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.m-chapter-name { font-size: 10px; font-weight: 500; color: var(--text1); margin-bottom: 1px; }
.m-chapter-meta { font-size: 8px; color: var(--text3); }

/* Mobile 4.2 */
.m-sort-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border-bottom: 0.5px solid var(--border3); }
.m-sort-label { font-size: 9px; color: var(--text3); }
.m-sort-sel { font-size: 9px; border: 0.5px solid var(--border2); border-radius: 4px; padding: 2px 5px; background: var(--bg); color: var(--text1); }
.m-story-list { padding: 8px 12px; }
.m-story-card { border: 0.5px solid var(--border3); border-radius: 6px; padding: 8px 10px; margin-bottom: 5px; cursor: pointer; }
.m-story-card:hover { background: var(--bg2); }
.m-sc-title { font-size: 10px; font-weight: 500; margin-bottom: 2px; }
.m-sc-meta { font-size: 8px; color: var(--text3); }
.m-sc-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.m-badge { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
.m-badge-warn { background: var(--warn-bg); color: var(--warn); }
.m-badge-lang { background: var(--bg2); color: var(--text2); font-weight: 400; }

/* Mobile 4.3 / 4.4 */
.m-story-header { padding: 10px 12px; border-bottom: 0.5px solid var(--border3); }
.m-story-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
.m-story-byline { font-size: 9px; color: var(--text3); margin-bottom: 7px; }
.m-story-byline strong { color: var(--text2); font-weight: 500; }
.m-translation-flag { display: flex; align-items: center; gap: 5px; background: var(--warn-bg); border: 0.5px solid var(--warn); border-radius: 5px; padding: 5px 8px; font-size: 9px; color: var(--warn); }
.m-translation-flag i { font-size: 12px; flex-shrink: 0; }
.m-story-body { padding: 10px 12px; flex: 1; }
.m-bilin-toggle { display: flex; border: 0.5px solid var(--border2); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
.m-bt-btn { flex: 1; font-size: 9px; padding: 3px 0; cursor: pointer; color: var(--text2); background: transparent; border: none; text-align: center; }
.m-bt-btn.active { background: var(--text1); color: var(--bg); }
.m-story-text { font-size: 11px; line-height: 1.8; color: var(--text1); }
.m-story-para { margin-bottom: 10px; }
.m-tags-section { padding: 7px 12px; border-top: 0.5px solid var(--border3); }
.m-tags-label { font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 5px; }
.m-tags-row { display: flex; gap: 4px; flex-wrap: wrap; }
.m-tag-chip { font-size: 9px; padding: 2px 8px; border: 0.5px solid var(--border2); border-radius: 20px; color: var(--info); cursor: pointer; }

/* Mobile audio player */
.m-audio-player { border-top: 0.5px solid var(--border3); padding: 8px 12px; display: flex; align-items: center; gap: 8px; background: var(--bg2); }
.m-play-btn { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; background: var(--bg); }
.m-play-btn.playing { background: var(--text1); border-color: var(--text1); }
.m-play-btn i { font-size: 11px; color: var(--text2); }
.m-play-btn.playing i { color: var(--bg); }
.m-wav-track { flex: 1; height: 22px; display: flex; align-items: center; gap: 1px; }
.m-wb { border-radius: 1px; background: var(--border3); width: 2px; }
.m-wb.p { background: var(--text1); }
.m-pt { font-size: 9px; color: var(--text3); flex-shrink: 0; }
.m-spd-btn { font-size: 8px; padding: 2px 6px; border: 0.5px solid var(--border2); border-radius: 3px; color: var(--text2); cursor: pointer; background: var(--bg); }
.m-spd-btn.active { background: var(--text1); color: var(--bg); border-color: var(--text1); }

/* Mobile story nav */
.m-story-nav { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px; border-top: 0.5px solid var(--border3); }
.m-snav-btn { font-size: 10px; color: var(--info); cursor: pointer; display: flex; align-items: center; gap: 3px; }
.m-snav-btn i { font-size: 12px; }
.m-snav-cur { font-size: 9px; color: var(--text3); }

/* Mobile 4.5 Record Yours CTA */
.record-cta { border-top: 1.5px solid var(--border2); padding: 12px; background: var(--bg); }
.cta-header { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.cta-body { font-size: 10px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.cta-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.cta-tag { font-size: 9px; padding: 2px 7px; border: 0.5px solid var(--border2); border-radius: 20px; color: var(--text2); background: var(--bg2); }
.cta-btn { display: block; width: 100%; padding: 10px; background: var(--text1); color: var(--bg); border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; margin-bottom: 4px; }
.cta-dismiss { font-size: 10px; color: var(--text3); text-align: center; cursor: pointer; padding: 5px; display: block; }

/* Annotations */
.ann-section { margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--border2); }
.ann-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 12px; }
.ann-grid { display: flex; flex-wrap: wrap; gap: 12px; }
.ann-item { flex: 1; min-width: 200px; padding-left: 10px; border-left: 2px solid var(--border2); }
.ann-t { font-size: 12px; font-weight: 500; color: var(--text1); margin-bottom: 3px; }
.ann-d { font-size: 11px; color: var(--text2); line-height: 1.5; }
</style>
</head>
<body>

<h1>Roeung (រឿង) — Book Reading Wireframes</h1>
<p class="subtitle">Sea family · Ellen Sea · Phase 1 MVP · Desktop + Mobile · Version 0.1</p>

<div class="controls">
  <div class="device-toggle">
    <button class="dt-btn active" id="dt-desk" onclick="setDevice('desktop')"><i class="ti ti-device-desktop"></i> Desktop</button>
    <button class="dt-btn" id="dt-mob" onclick="setDevice('mobile')"><i class="ti ti-device-mobile"></i> Mobile</button>
  </div>
  <span class="sep">|</span>
  <button class="nav-btn cur" onclick="goTo(1)">4.1 Book Home</button>
  <button class="nav-btn" onclick="goTo(2)">4.2 Chapter View</button>
  <button class="nav-btn" onclick="goTo(3)">4.3 Story Page</button>
  <button class="nav-btn" onclick="goTo(4)">4.4 Listen Mode</button>
  <button class="nav-btn" id="nav-cta" onclick="goTo(5)">4.5 Record Yours</button>
</div>

<div id="screen-area"></div>

<div class="ann-section">
  <div class="ann-title">Annotations</div>
  <div class="ann-grid" id="ann-grid"></div>
</div>

<script>
let device = 'desktop';
let scr = 1;
let menuOpen = false;

function setDevice(d) {
  device = d;
  document.getElementById('dt-desk').className = 'dt-btn' + (d === 'desktop' ? ' active' : '');
  document.getElementById('dt-mob').className = 'dt-btn' + (d === 'mobile' ? ' active' : '');
  render();
}

function goTo(s) {
  scr = s; menuOpen = false;
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.className = 'nav-btn' + ((i + 1) === s ? ' cur' : '');
  });
  render();
}

function toggleMenu() { menuOpen = !menuOpen; render(); }

function hbBtn(sz) {
  return `<button onclick="toggleMenu()" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;flex-shrink:0"><i class="ti ti-menu-2" style="font-size:${sz||15}px;color:var(--text2)"></i></button>`;
}

function drawerHTML(act, showQueue) {
  const items = [{key:'book',icon:'ti-book',label:'The Book'},{key:'record',icon:'ti-microphone',label:'Record a Story'},...(showQueue?[{key:'queue',icon:'ti-inbox',label:'Review Queue'}]:[])];

function wavBars(n, frac) {
  const h = [8,14,22,16,28,20,18,26,10,30,24,14,20,12,26,8,22,18,28,12,20,24,16,18,22,10,26,20,12,16,24,8,18,22,14,28,16,20,10,24,18,12,26,8,20,16,22,14,28,10,18,24,16,22,12,20,26,8,14,22,18,28,10,16,24,20,12,26,14,18,22,8,20,16,28,12,24,18,10,26];
  return h.slice(0,n).map((v,i) => `<div class="${i/n < frac ? 'wb p' : 'wb'}" style="height:${v}px"></div>`).join('');
}

function mWavBars(n, frac) {
  const h = [6,10,14,10,18,13,11,16,7,19,15,9,13,9,17,7,13,11,17,9,13,15,9,13,15,7,17,12,9,11,15,7,11,15,9,17,11,13,7,15,11,9,16,7,12,10,14,9,17,7,11,15,10,14,9,12,16,6,9,13];

  <button style="display:block;width:100%;max-width:200px;padding:11px;background:var(--text1);color:var(--bg);border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;margin:0 auto 10px">
    <i class="ti ti-microphone" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i> Record a story
  </button>
  <span style="font-size:11px;color:var(--text3);cursor:pointer">Not now</span>
</div>`;
}

// ── Annotations ─────────────────────────────────────────────────────────

const ANNOTATIONS = {

function renderAnnotations() {
  return (ANNOTATIONS[scr] || []).map(a =>
    `<div class="ann-item"><div class="ann-t">${a.t}</div><div class="ann-d">${a.d}</div></div>`
  ).join('');
}

render();
</script>
